# OpenTelemetry Java agent — supported libraries version catalog
#
# Source: https://opentelemetry.io/docs/zero-code/java/agent/supported-libraries/
#
# Every entry uses a `strictly` version range so Gradle will REFUSE to resolve a
# version outside the window the OpenTelemetry Java agent can auto-instrument.
#   "X+"                 -> strictly = "[X,)"          (minimum supported, any newer)
#   "X+ (not incl. Y+)"  -> strictly = "[X, Y["        (Y excluded)
#   "A-B.x"              -> strictly = "[A, B+1["       (closed window)
#
# JDK-/spec-level instrumentations need no dependency and are intentionally NOT
# listed as coordinates (they are instrumented in place by the agent):
#   HttpURLConnection (8+), Java HTTP Client (11+), Java HTTP Server (8+),
#   Java Executors (8+), java.util.logging (8+), Java Platform runtime (8+),
#   JDBC (8+, bring your own driver).
#
# Where a single framework name maps to multiple instrumentation modules
# (e.g. HttpClient 4.x vs 5.x), separate aliases are provided.

[versions]

# --- HTTP clients ---
apache-httpclient4        = { strictly = "[4.3, 5.0[" }   # Apache HttpClient 4.3+
apache-httpclient5        = { strictly = "[5.2,)" }       # Apache HttpClient 5.2+
apache-httpasyncclient    = { strictly = "[4.1,)" }       # Apache HttpAsyncClient 4.1+
asynchttpclient           = { strictly = "[1.9,)" }       # AsyncHttpClient 1.9+
google-http-client        = { strictly = "[1.19,)" }      # Google HTTP Client 1.19+
okhttp                    = { strictly = "[3.0,)" }       # OkHttp (module okhttp-3.0)
jodd-http                 = { strictly = "[4.2,)" }       # Jodd HTTP 4.2+

# --- Web servers / frameworks ---
servlet-api               = { strictly = "[2.2,)" }       # Servlet 2.2+ (javax; jakarta servlet 5.0+ also instrumented)
