# --- Reactive / async / concurrency / scheduling ---
reactor-core              = { module = "io.projectreactor:reactor-core",              version.ref = "reactor" }
rxjava1                   = { module = "io.reactivex:rxjava",                         version.ref = "rxjava1" }
rxjava2                   = { module = "io.reactivex.rxjava2:rxjava",                 version.ref = "rxjava2" }
rxjava3                   = { module = "io.reactivex.rxjava3:rxjava",                 version.ref = "rxjava3" }
kotlinx-coroutines-core   = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlinx-coroutines" }
guava                     = { module = "com.google.guava:guava",                      version.ref = "guava" }
akka-actor                = { module = "com.typesafe.akka:akka-actor_2.13",           version.ref = "akka-actor" }
pekko-actor               = { module = "org.apache.pekko:pekko-actor_2.13",           version.ref = "pekko-actor" }
hystrix-core              = { module = "com.netflix.hystrix:hystrix-core",            version.ref = "hystrix" }
failsafe                  = { module = "dev.failsafe:failsafe",                       version.ref = "failsafe" }
quartz                    = { module = "org.quartz-scheduler:quartz",                version.ref = "quartz" }
spring-context            = { module = "org.springframework:spring-context",          version.ref = "spring-context" }
spring-batch-core         = { module = "org.springframework.batch:spring-batch-core", version.ref = "spring-batch" }
spring-integration-core   = { module = "org.springframework.integration:spring-integration-core", version.ref = "spring-integration" }
powerjob-worker           = { module = "tech.powerjob:powerjob-worker",              version.ref = "powerjob" }
elasticjob-lite-core      = { module = "org.apache.shardingsphere.elasticjob:elasticjob-lite-core", version.ref = "elasticjob" }
shenyu-bootstrap          = { module = "org.apache.shenyu:shenyu-bootstrap",          version.ref = "shenyu" }
camel-core                = { module = "org.apache.camel:camel-core",                 version.ref = "camel" }
activej-http              = { module = "io.activej:activej-http",                     version.ref = "activej" }
jfinal                    = { module = "com.jfinal:jfinal",                           version.ref = "jfinal" }
ktor-server-core          = { module = "io.ktor:ktor-server-core",                    version.ref = "ktor-server" }

# --- Logging ---
log4j1                    = { module = "log4j:log4j",                                 version.ref = "log4j1" }
log4j2-core               = { module = "org.apache.logging.log4j:log4j-core",         version.ref = "log4j2" }
logback-classic           = { module = "ch.qos.logback:logback-classic",             version.ref = "logback" }
jboss-logmanager          = { module = "org.jboss.logmanager:jboss-logmanager",       version.ref = "jboss-logmanager" }

# --- Metrics / runtime / system ---
micrometer-core           = { module = "io.micrometer:micrometer-core",               version.ref = "micrometer" }
dropwizard-metrics-core   = { module = "io.dropwizard.metrics:metrics-core",          version.ref = "dropwizard-metrics" }
oshi-core                 = { module = "com.github.oshi:oshi-core",                   version.ref = "oshi" }

[bundles]
# Convenience groupings of commonly co-used, OTel-instrumented libraries.
# Where a library ships javax/jakarta or v-N variants, the bundle picks the modern
# one to avoid pulling conflicting versions into one resolution; the other alias
# remains available individually.

http-clients = [
    "apache-httpclient5",
    "apache-httpasyncclient",
    "asynchttpclient",
    "google-http-client",
    "okhttp",
    "jodd-http",
]

spring = [
    "spring-boot-autoconfigure",
    "spring-webmvc",
    "spring-webflux",
    "spring-data-commons",
    "spring-context",
    "spring-batch-core",
    "spring-integration-core",
    "spring-ws-core",
]

spring-messaging = [
    "spring-kafka",
    "spring-jms",
    "spring-rabbit",
]

messaging = [
    "kafka-clients",
    "kafka-streams",
    "jms-api",
    "rabbitmq-amqp-client",
    "pulsar-client",
    "rocketmq-client5",
    "nats-client",
]

jdbc-pools = [
